<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>中2 単元進捗アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <p class="label">中学2年生向け</p>
      <h1>単元進捗アプリ</h1>
      <p class="lead">英語・数学・理科・国語・社会の単元を、スマホでかんたんに記録できます。</p>
    </header>

    <section class="panel">
      <div class="panel-title">
        <h2>クラウド同期</h2>
        <span id="syncStatus" class="count-badge">確認中</span>
      </div>
      <p class="panel-note">Firebase設定後は、同じアカウントでログインしたPC・スマホのデータが同期されます。</p>

      <form id="loginForm" class="login-form">
        <label>
          メールアドレス
          <input id="emailInput" type="email" autocomplete="email" placeholder="例：sample@example.com">
        </label>

        <label>
          パスワード
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Firebaseで作成したパスワード">
        </label>

        <div class="button-row wide">
          <button id="loginButton" class="primary-button compact-button" type="submit">ログイン</button>
          <button id="logoutButton" class="secondary-button" type="button">ログアウト</button>
          <button id="uploadLocalButton" class="secondary-button" type="button">ローカルデータをクラウドへ送る</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>単元を登録</h2>

      <form id="unitForm" class="form">
        <label>
          日付
          <input id="dateInput" type="date" required>
        </label>

        <label>
          教科
          <select id="subjectInput" required>
            <option value="">選択してください</option>
            <option value="英語">英語</option>
            <option value="数学">数学</option>
            <option value="理科">理科</option>
            <option value="国語">国語</option>
            <option value="社会">社会</option>
          </select>
        </label>

        <label>
          単元名
          <input id="unitNameInput" type="text" placeholder="例：一次関数、Unit 3" required>
        </label>

        <label>
          状態
          <select id="statusInput" required>
            <option value="未着手">未着手</option>
            <option value="学習中">学習中</option>
            <option value="完了">完了</option>
            <option value="復習必要">復習必要</option>
          </select>
        </label>

        <label>
          理解度 1〜5
          <select id="understandingInput" required>
            <option value="1">1：まだ難しい</option>
            <option value="2">2：少し分かった</option>
            <option value="3">3：だいたい分かった</option>
            <option value="4">4：よく分かった</option>
            <option value="5">5：人に説明できる</option>
          </select>
        </label>

        <label class="wide">
          メモ
          <textarea id="memoInput" rows="3" placeholder="例：文章題をもう一度やる"></textarea>
        </label>

        <button class="primary-button" type="submit">登録する</button>
      </form>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>教科別の集計</h2>
        <span id="totalCount" class="count-badge">0単元</span>
      </div>
      <div id="summaryArea" class="summary-grid"></div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>登録済み単元</h2>
        <div class="button-row">
          <button id="reviewFilterButton" class="secondary-button" type="button">復習必要だけ表示</button>
          <button id="csvButton" class="secondary-button" type="button">CSV出力</button>
          <button id="backupButton" class="secondary-button" type="button">JSON出力</button>
          <button id="importAddButton" class="secondary-button" type="button">読込（追加）</button>
          <button id="importReplaceButton" class="secondary-button" type="button">読込（置換）</button>
          <input id="importFileInput" class="file-input" type="file" accept="application/json,.json">
        </div>
      </div>
      <p class="panel-note">CSVは確認用、JSONはスマホとPCのデータ移動・復元用です。</p>

      <div id="unitList" class="unit-list"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
